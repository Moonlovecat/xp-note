services:
  postgres:
    image: postgres:16
    container_name: weenai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: weenai
      POSTGRES_PASSWORD: weenai
      POSTGRES_DB: weenai
    ports:
      - "5432:5432"
    volumes:
      - weenai-postgres-data:/var/lib/postgresql/data

volumes:
  weenai-postgres-data:
